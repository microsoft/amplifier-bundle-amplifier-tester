# Verifies the amplifier-tester bundle works in a fresh Amplifier installation.
# Installs Amplifier CLI, adds the amplifier-tester bundle (and its DTU + Gitea
# dependencies) from a local Gitea instance so local changes are tested without
# pushing to origin.
#
# Prerequisites:
#   - A running Gitea instance with this repo pushed
#   - ANTHROPIC_API_KEY set on the host
#
# Usage:
#   amplifier-gitea create --port 10110
#   # push this repo to Gitea, then:
#   amplifier-digital-twin launch .amplifier/digital-twin-universe/profiles/amplifier-tester-self-validation.yaml \
#     --var GITEA_URL=http://localhost:10110 \
#     --var GITEA_TOKEN=<token from create>
#
# Variables (provided at launch via --var):
#   GITEA_URL   -- Gitea base URL (e.g. http://localhost:10110)
#   GITEA_TOKEN -- API token for Gitea
name: amplifier-tester-self-validation
description: >
  Amplifier session with the amplifier-tester bundle installed from
  local Gitea, including the DTU and Gitea dependencies.
base:
  image: ubuntu:24.04

url_rewrites:
  auth:
    username: admin
    token_var: GITEA_TOKEN
  rules:
    - match: github.com/microsoft/amplifier-bundle-amplifier-tester
      target: ${GITEA_URL}/admin/amplifier-bundle-amplifier-tester

passthrough:
  allow_external: true
  services:
    - name: anthropic
      key_env: ANTHROPIC_API_KEY

provision:
  setup_cmds:
    - apt-get update && apt-get install -y git curl
    - curl -LsSf https://astral.sh/uv/install.sh | sh

    # Install Amplifier CLI
    - uv tool install git+https://github.com/microsoft/amplifier

    # Configure Amplifier provider
    - |
      mkdir -p /root/.amplifier
      cat > /root/.amplifier/settings.yaml << EOF
      config:
        providers:
          - module: provider-anthropic
            source: git+https://github.com/microsoft/amplifier-module-provider-anthropic@main
            config:
              api_key: $ANTHROPIC_API_KEY
      EOF

    # Install the amplifier-tester bundle from Gitea (picks up local changes).
    # The URL rewrite redirects github.com/microsoft/... to Gitea.
    # DTU and Gitea dependencies come from upstream GitHub.
    - amplifier bundle add git+https://github.com/microsoft/amplifier-bundle-amplifier-tester@main --app

    # Verify
    - amplifier --version
    - amplifier bundle list

    - mkdir -p /home/user/project

update:
  cmds:
    - amplifier update --yes --force

readiness:
  - name: amplifier-installed
    command: "amplifier --version"
